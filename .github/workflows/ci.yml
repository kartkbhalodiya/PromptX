name: PromptX CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install only essential packages for CI
        pip install flake8
        # Skip heavy dependencies like scipy, spacy for faster CI
    
    - name: Check code style
      run: |
        flake8 backend/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=__pycache__,venv
    
    - name: Verify syntax
      run: |
        python -c "
        import ast, sys, os
        files = []
        if os.path.exists('backend/app.py'):
            files.append('backend/app.py')
        if os.path.exists('backend/services.py'):
            files.append('backend/services.py')
        if os.path.exists('tests/test_fallback.py'):
            files.append('tests/test_fallback.py')
        
        for f in files:
            try:
                with open(f) as file:
                    ast.parse(file.read())
                print(f'✅ {f} OK')
            except SyntaxError as e:
                print(f'❌ {f}: {e}')
                sys.exit(1)
        
        if not files:
            print('⚠️  No Python files found to check')
        "

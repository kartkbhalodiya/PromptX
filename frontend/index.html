<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptX - Transform Your Prompts</title>
  <link rel="icon" type="image/svg+xml" href="Public/star.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
  <link rel="manifest" href="favicon_io/site.webmanifest">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@700;800;900&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-icons@latest/dist/umd/lucide.min.css">
</head>
<body>
  <div class="gradient-bg"></div>
  
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="Public/bot-img.png" alt="PromptX" class="sidebar-logo">
      <h2>PROMPTX</h2>
      <button class="sidebar-close" id="sidebar-close">
        <i data-lucide="x"></i>
      </button>
    </div>
    
    <button class="new-chat-btn" id="new-chat-btn">
      <i data-lucide="plus"></i>
      New Chat
    </button>
    
    <nav class="sidebar-nav">
      <button class="nav-item active" data-mode="enhance">
        <i data-lucide="sparkles"></i>
        <span>Enhance</span>
      </button>
      <button class="nav-item" data-mode="analyze">
        <i data-lucide="activity"></i>
        <span>Analyze</span>
      </button>
      <button class="nav-item" data-mode="compare">
        <i data-lucide="git-compare"></i>
        <span>Compare</span>
      </button>
      <button class="nav-item" data-mode="history">
        <i data-lucide="clock"></i>
        <span>History</span>
      </button>
    </nav>
    
    <div class="sidebar-settings" style="margin-top: auto; padding: 1.5rem 1rem 1rem 1rem; border-top: 1px solid var(--border);">
      <label style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block;"><i data-lucide="key" style="width: 12px; height: 12px; display: inline; margin-bottom: -2px;"></i> API Key</label>
      <input type="password" id="api-key-input" placeholder="Required if set on server" style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 0.85rem;" />
    </div>
  </aside>
  
  <!-- Main Chat Area -->
  <main class="chat-container">
    <div class="chat-header">
      <button class="sidebar-toggle" id="sidebar-toggle">
        <i data-lucide="menu"></i>
      </button>
      <div class="chat-title">PromptX AI</div>
    </div>

    <!-- Chat Messages -->
    <div class="chat-messages" id="chat-messages">
      <div class="welcome-screen" id="welcome-screen">
        <img src="Public/bot-img.png" alt="PromptX" class="welcome-logo">
        <h1>PROMPTX</h1>
        <p>Transform your prompts with AI</p>
        
        <div class="quick-actions">
          <button class="quick-action" data-action="enhance">
            <i data-lucide="sparkles"></i>
            <div>
              <strong>Enhance Prompt</strong>
              <span>Make it professional</span>
            </div>
          </button>
          <button class="quick-action" data-action="analyze">
            <i data-lucide="activity"></i>
            <div>
              <strong>Analyze Quality</strong>
              <span>Get detailed scores</span>
            </div>
          </button>
          <button class="quick-action" data-action="compare">
            <i data-lucide="git-compare"></i>
            <div>
              <strong>Compare Variations</strong>
              <span>A/B test prompts</span>
            </div>
          </button>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="chat-input-container">
      <div class="chat-input-wrapper">
        <div class="custom-model-select" id="custom-model-select">
          <div class="select-selected">
            <i data-lucide="bot"></i> <span>Auto (Fallback)</span>
            <i data-lucide="chevron-down" class="chevron"></i>
          </div>
          <div class="select-items select-hide">
            <div data-value="auto" data-icon="bot" class="same-as-selected"><i data-lucide="bot"></i> <span>Auto (Fallback)</span></div>
            <div data-value="gemini" data-icon="sparkles"><i data-lucide="sparkles"></i> <span>Gemini 2.0</span></div>
            <div data-value="nvidia_mistral" data-icon="brain"><i data-lucide="brain"></i> <span>NVIDIA Mistral</span></div>
            <div data-value="nvidia_qwen" data-icon="hexagon"><i data-lucide="hexagon"></i> <span>NVIDIA Qwen</span></div>
            <div data-value="huggingface" data-icon="smile"><i data-lucide="smile"></i> <span>HuggingFace</span></div>
          </div>
        </div>
        <textarea 
          id="chat-input" 
          placeholder="Message PromptX..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="send-btn" disabled>
          <i data-lucide="arrow-up"></i>
        </button>
      </div>
      <div class="input-footer">
        <span class="mode-indicator" id="mode-indicator">Enhance Mode</span>
      </div>
    </div>
  </main>



  <div id="toast-container" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <script src="index.js"></script>
</body>
</html>

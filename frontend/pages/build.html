<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build - PromptX</title>
  <link rel="icon" type="image/svg+xml" href="Public/star.svg">
  <link rel="stylesheet" href="styles/build.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">
        <img src="Public/bot-img.png" alt="PromptX">
        <span>PromptX</span>
      </a>
      <div class="nav-links">
        <a href="build.html" class="active">Build</a>
        <a href="integrations.html">Integrations</a>
        <a href="pricing.html">Pricing</a>
        <a href="docs.html">Docs</a>
      </div>
    </div>
    <div class="nav-right">
      <a href="https://github.com/Santosh-Prasad-Verma/PromptX" target="_blank" class="nav-link">GitHub</a>
      <a href="chat.html" class="btn-primary">Launch Terminal</a>
    </div>
  </nav>

  <!-- Main Build Area -->
  <main class="build-container">
    <!-- Sidebar -->
    <aside class="build-sidebar">
      <div class="sidebar-section">
        <h3>Tools</h3>
        <button class="tool-btn active" data-tool="enhance">
          <span class="tool-icon"> sparkle</span>
          <span>Enhance</span>
        </button>
        <button class="tool-btn" data-tool="analyze">
          <span class="tool-icon"> chart</span>
          <span>Analyze</span>
        </button>
        <button class="tool-btn" data-tool="abtest">
          <span class="tool-icon"> git-compare</span>
          <span>A/B Test</span>
        </button>
        <button class="tool-btn" data-tool="templates">
          <span class="tool-icon"> file-text</span>
          <span>Templates</span>
        </button>
      </div>
      
      <div class="sidebar-section">
        <h3>Models</h3>
        <div class="model-list">
          <button class="model-btn active" data-model="auto">
            <span class="model-dot"></span>
            Auto (Fallback)
          </button>
          <button class="model-btn" data-model="gemini">
            <span class="model-dot"></span>
            Gemini 2.0
          </button>
          <button class="model-btn" data-model="nvidia_mistral">
            <span class="model-dot"></span>
            NVIDIA Mistral
          </button>
          <button class="model-btn" data-model="nvidia_qwen">
            <span class="model-dot"></span>
            NVIDIA Qwen
          </button>
          <button class="model-btn" data-model="huggingface">
            <span class="model-dot"></span>
            HuggingFace
          </button>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>History</h3>
        <div class="history-list" id="history-list">
          <div class="history-empty">No recent builds</div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="build-main">
      <!-- Chat Area -->
      <div class="chat-area" id="chat-area">
        <div class="welcome-message" id="welcome-message">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
          </div>
          <h2>What would you like to build?</h2>
          <p>Describe what you want to create, and I'll help you craft the perfect prompt.</p>
          
          <div class="quick-starts">
            <button class="quick-start" onclick="quickStart('blog')">
              <span class="qs-icon"> pen-tool</span>
              <span>Blog Post</span>
            </button>
            <button class="quick-start" onclick="quickStart('code')">
              <span class="qs-icon"> code</span>
              <span>Code</span>
            </button>
            <button class="quick-start" onclick="quickStart('email')">
              <span class="qs-icon"> mail</span>
              <span>Email</span>
            </button>
            <button class="quick-start" onclick="quickStart('strategy')">
              <span class="qs-icon"> lightbulb</span>
              <span>Strategy</span>
            </button>
          </div>
        </div>
        
        <div class="messages-container" id="messages-container"></div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="prompt-input" placeholder="Describe what you want to create..." rows="1"></textarea>
          <button class="send-button" id="send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 19V5M5 12l7-7 7 7"/>
            </svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="char-count" id="char-count">0 characters</span>
          <span class="model-badge" id="model-badge">Auto</span>
        </div>
      </div>
    </div>

    <!-- Results Panel -->
    <aside class="results-panel" id="results-panel">
      <div class="panel-header">
        <h3>Results</h3>
        <button class="panel-close" id="panel-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="panel-content" id="panel-content">
        <div class="panel-empty">
          <p>Your enhanced prompt will appear here</p>
        </div>
      </div>
    </aside>
  </main>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="scripts/build.js"></script>
</body>
</html>

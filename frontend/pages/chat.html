<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptX — AI Chat Terminal</title>
  <meta name="description" content="PromptX interactive AI prompt engineering terminal.">
  <meta name="theme-color" content="#00ff41">
  <link rel="icon" type="image/svg+xml" href="../Public/star.svg">
  <link rel="stylesheet" href="../styles/index.css">
  <link rel="stylesheet" href="../styles/chat.css">
</head>
<body>

  <!-- Background -->
  <div class="cyber-bg"></div>
  <div class="scanlines"></div>

  <!-- Sidebar -->
  <aside class="chat-sidebar" id="chat-sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="sidebar-brand">
        <img src="../Public/bot-img.png" alt="PromptX">
        <span>PROMPTX</span>
      </a>
      <button class="sidebar-close-btn" id="sidebar-close" title="Close sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <button class="new-chat-btn" id="new-chat-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      New Chat
    </button>

    <!-- Mode Selection -->
    <div class="sidebar-section">
      <div class="sidebar-label">Mode</div>
      <div class="mode-list" id="mode-list">
        <button class="mode-item active" data-mode="enhance">
          <span class="mode-icon">✦</span> Enhance
        </button>
        <button class="mode-item" data-mode="analyze">
          <span class="mode-icon">◈</span> Analyze
        </button>
        <button class="mode-item" data-mode="compare">
          <span class="mode-icon">⇄</span> Compare
        </button>
      </div>
    </div>

    <!-- Chat History -->
    <div class="sidebar-section sidebar-history-section">
      <div class="sidebar-label">History</div>
      <div class="history-list" id="history-list">
        <!-- Populated by JS -->
        <div class="history-empty" id="history-empty">
          <span style="opacity: 0.4;">No chats yet</span>
        </div>
      </div>
    </div>

    <!-- Model & API Key -->
    <div class="sidebar-footer">
      <div class="sidebar-label">Model</div>
      <div class="model-select-list" id="model-select-list">
        <button class="model-option active" data-model="gemini">
          <span class="model-dot gemini-dot"></span>
          Gemini 2.0 Flash
        </button>
        <button class="model-option" data-model="groq">
          <span class="model-dot groq-dot"></span>
          Groq (Llama 3)
        </button>
        <button class="model-option" data-model="nvidia">
          <span class="model-dot nvidia-dot"></span>
          NVIDIA Minimax
        </button>
        <button class="model-option" data-model="mistral">
          <span class="model-dot mistral-dot"></span>
          Mistral Large
        </button>
        <button class="model-option" data-model="llama_405b">
          <span class="model-dot llama-dot"></span>
          Llama 405B
        </button>
        <button class="model-option" data-model="glm">
          <span class="model-dot glm-dot"></span>
          GLM 4.7 (Thinking)
        </button>
        <button class="model-option" data-model="deepseek">
          <span class="model-dot deepseek-dot"></span>
          DeepSeek V3
        </button>
        <button class="model-option" data-model="kimi">
          <span class="model-dot kimi-dot"></span>
          Kimi K2.5
        </button>
        <button class="model-option" data-model="kimi_think">
          <span class="model-dot kimi-think-dot"></span>
          Kimi Thinking
        </button>
        <button class="model-option" data-model="gpt_oss">
          <span class="model-dot gpt-oss-dot"></span>
          GPT OSS 120B
        </button>
      </div>
      <div class="sidebar-label" style="margin-top:0.85rem;">API Key</div>
      <input type="password" id="api-key-input" placeholder="Optional — leave blank to use default" class="sidebar-api-input">
    </div>
  </aside>

  <!-- Main Chat Area -->
  <main class="chat-main" id="chat-main">
    <!-- Top Bar -->
    <div class="chat-topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle-btn" id="sidebar-toggle" title="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="topbar-title">
          <span class="topbar-mode" id="topbar-mode">Enhance Mode</span>
        </div>
      </div>
      <div class="topbar-right">
        <span class="topbar-model-badge" id="topbar-model-badge">Gemini 2.0</span>
      </div>
    </div>

    <!-- Chat Messages -->
    <div class="chat-messages-area" id="chat-messages">
      <div class="welcome-screen" id="welcome-screen">
        <img src="/Public/bot-img.png" alt="PromptX" class="welcome-logo">
        <h1>PROMPTX</h1>
        <p>Pick a mode below, type your prompt, and hit send.</p>
        
        <div class="welcome-cards">
          <button class="welcome-card" data-action="enhance">
            <div class="wc-icon">✦</div>
            <div class="wc-text">
              <strong>Enhance Prompt</strong>
              <span>Rewrite it to be clearer and more detailed</span>
            </div>
          </button>
          <button class="welcome-card" data-action="analyze">
            <div class="wc-icon">◈</div>
            <div class="wc-text">
              <strong>Analyze Quality</strong>
              <span>Get a score and tips to improve it</span>
            </div>
          </button>
          <button class="welcome-card" data-action="compare">
            <div class="wc-icon">⇄</div>
            <div class="wc-text">
              <strong>Compare Versions</strong>
              <span>See 3 different rewrites side by side</span>
            </div>
          </button>
        </div>

        <div class="welcome-examples">
          <div class="examples-label">Try an example:</div>
          <button class="example-chip" onclick="fillPrompt('Write a blog post about artificial intelligence')">Write a blog about AI</button>
          <button class="example-chip" onclick="fillPrompt('Create a Python function to sort a list of dictionaries by key')">Sort list of dicts in Python</button>
          <button class="example-chip" onclick="fillPrompt('Design a marketing strategy for a SaaS product launch')">SaaS marketing strategy</button>
        </div>
      </div>
    </div>

    <!-- Chat Input -->
    <div class="chat-input-bottom">
      <div class="chat-input-wrapper">
        <textarea id="chat-input" placeholder="Enter a prompt to enhance..." rows="1"></textarea>
        <button class="send-btn" id="send-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
      <div class="input-footer">
        <span class="mode-indicator" id="mode-indicator">Enhance Mode</span>
        <span class="char-count" id="char-count">0 chars</span>
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
  <script>
    if (window.mermaid) {
      mermaid.initialize({ startOnLoad: false, theme: 'dark' });
    }
  </script>
  <script src="../scripts/chat.js"></script>
</body>
</html>
